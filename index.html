<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Weave - Voice Travel Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

    <main class="app-shell">
        <section class="chat-panel panel">
            <header class="panel-header">
                <p class="eyebrow">Trip Weave</p>
                <h1>Travel Assistant</h1>
                <p class="subtitle">Plan a route, ask for ideas, or speak your trip request.</p>
            </header>

            <div id="chatHistory" class="chat-history" aria-live="polite"></div>

            <div class="voice-toolbar">
                <button id="micBtn" class="btn btn-outline" type="button">Start Voice Input</button>
                <button id="speakBtn" class="btn btn-outline" type="button">Speak Last Reply</button>
                <label class="voice-toggle" for="autoSpeakToggle">
                    <input id="autoSpeakToggle" type="checkbox">
                    Auto speak
                </label>
            </div>

            <p id="voiceStatus" class="voice-status" aria-live="polite">Voice is ready.</p>

            <form id="chatForm" class="chat-input-area">
                <input type="text" id="userInput" placeholder="Try: Find flights to Tokyo in August" autocomplete="off">
                <button id="sendBtn" class="btn btn-primary" type="submit">Send</button>
            </form>
        </section>

        <section class="results-panel panel">
            <header class="panel-header results-header">
                <p class="eyebrow">Offers</p>
                <h2>Flight Suggestions</h2>
            </header>

            <div id="offersContainer" class="flights-container">
                <article class="flight-card placeholder-card">
                    <h3>Waiting for your request</h3>
                    <p>Ask for a destination and time window to get sample offers.</p>
                </article>
            </div>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
