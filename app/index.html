<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip-Weave</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div class="page-bg"></div>

    <header class="topbar">
      <div class="brand-wrap">
        <span class="brand-icon">🧭</span>
        <h1>Trip-Weave</h1>
      </div>
      <div class="topbar-actions">
        <button onclick="toggleDrawer()" class="btn btn-ghost">
          <i class="fa-solid fa-heart text-red-500"></i>
          Saved Flights
        </button>
        <button id="authNavBtn" class="btn btn-primary">Sign In</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="dashboard-split">
        <section class="dashboard-left glass-card">
          <div class="section-header">
            <h2>Trending destinations</h2>
          </div>
          <div class="destination-grid">
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Barcelona on 2026-11-23"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1583422409516-2895a77efded?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Barcelona</span>
              <span class="meta">Sun 23 Nov from $43</span>
              <span class="submeta">Spain • 2h 50m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to London on 2026-12-31"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=1400&q=80&quot;);
              "
            >
              <span class="city">London</span>
              <span class="meta">Thu 31 Dec from $53</span>
              <span class="submeta">United Kingdom • 2h 10m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Palma de Mallorca on 2026-11-05"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1613210197940-6f44d9f5f390?auto=format&fit=crop&w=900&q=80&quot;);
              "
            >
              <span class="city">Palma</span>
              <span class="meta">Thu 5 Nov from $76</span>
              <span class="submeta">Majorca • 3h 15m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Madrid on 2027-01-23"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1539037116277-4db20889f2d4?auto=format&fit=crop&w=900&q=80&quot;);
              "
            >
              <span class="city">Madrid</span>
              <span class="meta">Sat 23 Jan from $80</span>
              <span class="submeta">Spain • 3h 30m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Paris on 2026-09-14"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Paris</span>
              <span class="meta">Mon 14 Sep from $49</span>
              <span class="submeta">France • 2h 05m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Lisbon on 2026-10-09"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1513735492246-483525079686?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Lisbon</span>
              <span class="meta">Fri 9 Oct from $72</span>
              <span class="submeta">Portugal • 3h 45m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Rome on 2026-09-22"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Rome</span>
              <span class="meta">Tue 22 Sep from $67</span>
              <span class="submeta">Italy • 2h 45m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Athens on 2026-08-17"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1555993539-1732b0258235?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Athens</span>
              <span class="meta">Mon 17 Aug from $89</span>
              <span class="submeta">Greece • 3h 10m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Istanbul on 2026-10-20"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Istanbul</span>
              <span class="meta">Tue 20 Oct from $94</span>
              <span class="submeta">Turkey • 3h 25m avg</span>
            </button>
            <button
              class="destination-card"
              data-prompt="Find a flight from Copenhagen to Amsterdam on 2026-11-11"
              style="
                background-image:
                  linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, 0.72)),
                  url(&quot;https://images.unsplash.com/photo-1512470876302-972faa2aa9a4?auto=format&fit=crop&w=1200&q=80&quot;);
              "
            >
              <span class="city">Amsterdam</span>
              <span class="meta">Wed 11 Nov from $55</span>
              <span class="submeta">Netherlands • 1h 45m avg</span>
            </button>
          </div>
        </section>

        <section class="dashboard-right glass-card">
          <section class="chat-panel">
            <header class="panel-header">
              <h3>Travel Assistant</h3>
            </header>
            <div class="chat-history">
              <div class="message ai-message">
                Hi! Tell me where and when you want to travel, and I will find
                flights.
              </div>
            </div>
            <div class="search-dock glass-card">
              <input
                type="text"
                id="userInput"
                placeholder="cheapest flights from New York to London"
              />
              <button id="sendBtn" aria-label="Search flights">Search</button>
            </div>
          </section>

          <section class="results-panel">
            <header class="panel-header">
              <h3>Flight offers</h3>
            </header>
            <div id="mapContainer" class="map-frame hidden"></div>
            <div id="flightsContainer" class="flights-container">
              <div id="skeletonView" class="empty-state">
                <p>Waiting for your search query...</p>
                <small
                  >Use the search bar below or click a trending
                  destination.</small
                >
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div id="authModal" class="modal hidden">
      <div class="modal-card">
        <button onclick="closeAuthModal()" class="close-btn" aria-label="Close">
          &times;
        </button>
        <h2 id="authTitle">Sign In</h2>
        <form id="authForm" onsubmit="submitAuthForm(event)">
          <div id="nameInputGroup" class="hidden">
            <label>Full Name</label>
            <input
              type="text"
              id="nameInput"
              placeholder="Enter your full name"
            />
          </div>
          <div>
            <label>Email Address</label>
            <input
              type="email"
              id="emailInput"
              required
              placeholder="you@example.com"
            />
          </div>
          <div>
            <label>Password</label>
            <input
              type="password"
              id="passwordInput"
              required
              placeholder="........"
            />
          </div>
          <button
            type="submit"
            id="authSubmitBtn"
            class="btn btn-primary auth-submit"
          >
            Sign In
          </button>
        </form>
        <p class="auth-switch-wrap">
          <button
            type="button"
            onclick="toggleAuthMode()"
            id="toggleAuthModeBtn"
            class="auth-switch"
          >
            Need an account? Sign Up
          </button>
        </p>
      </div>
    </div>

    <aside id="savedFlightsDrawer" class="saved-drawer">
      <div class="drawer-head">
        <h2>My Saved Offers</h2>
        <button onclick="toggleDrawer()" class="close-btn" aria-label="Close">
          &times;
        </button>
      </div>
      <div id="savedFlightsContainer" class="drawer-body">
        <p id="emptyDrawerMessage" class="empty-saved">
          Your saved flights will appear here.
        </p>
      </div>
    </aside>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js?v=20260628"></script>
    <script type="module" src="save-flights.js?v=20260628"></script>
  </body>
</html>
