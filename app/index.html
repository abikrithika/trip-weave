<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWeave | Flight AI Assistant</title>
    
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 font-sans antialiased">
    
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🧬</span>
        <h1 class="text-xl font-bold text-gray-800 tracking-tight">TripWeave</h1>
      </div>
      <div class="flex items-center gap-3">
        <button id="savedFlightsToggleBtn" onclick="toggleDrawer()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1.5 shadow-sm">
          <i class="fa-solid fa-heart" style="color: rgb(217, 54, 98)"></i>Saved Flights
        </button>
        <button id="authNavBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
          Sign In
        </button>
      </div>
    </header>

    <main class="app-container max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-73px)]">
      <section class="overflow-y-auto pr-2">
        <h2 class="font-bold text-gray-700 mb-4">Trending destinations</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button class="destination-card p-4 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition text-left" data-prompt="Find a flight from Copenhagen to Barcelona">
                <span class="block font-bold text-gray-900">Barcelona</span>
                <span class="block text-xs text-gray-500">From $43 • 2h 50m</span>
            </button>
            </div>
      </section>

      <section class="flex flex-col gap-6 overflow-hidden">
        <section class="chat-panel bg-white border border-gray-200 rounded-2xl flex flex-col flex-1 shadow-sm overflow-hidden">
          <header class="bg-gray-50 border-b border-gray-200 p-4 font-bold text-gray-700">🤖 Travel Assistant</header>
          <div class="chat-history flex-1 p-4 overflow-y-auto space-y-4">
            <div class="message ai-message bg-blue-50 text-blue-900 max-w-[80%] p-3 rounded-2xl rounded-tl-none text-sm shadow-sm">
              Hi! Where would you like to fly today?
            </div>
          </div>
          <div class="chat-input-area p-4 border-t border-gray-200 flex gap-2 bg-gray-50">
            <input type="text" id="userInput" placeholder="Type your message..." class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 text-black" />
            <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition shadow-sm">Send</button>
          </div>
        </section>
      </section>
    </main>

    <div id="authModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm grid place-items-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 font-bold text-xl">&times;</button>
            <h2 id="authTitle" class="text-2xl font-bold mb-6 text-center">Sign In</h2>
            <form id="authForm" class="space-y-4">
                <div id="nameInputGroup" class="hidden">
                    <label class="block text-sm font-medium">Full Name</label>
                    <input type="text" id="nameInput" class="w-full border p-2.5 rounded-lg text-black" />
                </div>
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="emailInput" required class="w-full border p-2.5 rounded-lg text-black" />
                </div>
                <div>
                    <label class="block text-sm font-medium">Password</label>
                    <input type="password" id="passwordInput" required class="w-full border p-2.5 rounded-lg text-black" />
                </div>
                <button type="submit" id="authSubmitBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-medium">Sign In</button>
            </form>
            <p class="text-sm text-center mt-6">
               <button type="button" id="toggleAuthModeBtn" class="text-blue-600 hover:underline">Need an account? Sign Up</button>
            </p>
        </div>
    </div>

    <div id="savedFlightsDrawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform z-40 flex flex-col border-l">
      <div class="p-4 border-b flex justify-between items-center bg-gray-50">
        <h2 class="font-bold">My Saved Flights</h2>
        <button onclick="toggleDrawer()" class="text-xl font-bold">&times;</button>
      </div>
      <div id="savedFlightsContainer" class="p-4 flex-1 overflow-y-auto"></div>
    </div>

    <div id="toastContainer" class="fixed top-5 right-5 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
